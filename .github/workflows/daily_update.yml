name: Daily Dashboard Update

on:
  schedule:
    - cron: '30 1 * * *'    # Every day at 7:00 AM IST (1:30 AM UTC) — price data
    - cron: '30 1 1 * *'    # 1st of every month at 7:00 AM IST — also runs fundamentals
  workflow_dispatch:          # Allows manual trigger from GitHub UI

# ── CRITICAL: grant write access so the action can push updated JSON files ──
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed so git push works on the right branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openpyxl

      - name: Run Daily Price Update
        run: python auto_update.py

      - name: Run Monthly Fundamentals Update (1st only)
        if: ${{ github.event_name == 'schedule' && startsWith(github.event.schedule, '30 1 1') }}
        run: |
          echo "Running monthly fundamentals refresh (1st of month)..."
          python update_fundamentals.py

      - name: Commit and push updated data files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dashboard.json dashboard_all.json history.json \
                  cache_raw.pkl.gz cache_adj.pkl.gz cache_raw_all.pkl.gz cache_adj_all.pkl.gz \
                  yf_profiles.json || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto-update data [skip ci]"
          git push
