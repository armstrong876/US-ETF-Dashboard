name: Daily Dashboard Update

on:
  schedule:
    - cron: '30 1 * * *' # 7:00 AM IST (1:30 AM UTC)
  workflow_dispatch: # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests # Ensure requests is installed

      - name: Run Auto Update
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: python auto_update.py

      - name: Commit and push changes (optional)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dashboard.json dashboard_all.json history.json history_all.json cache_raw.pkl.gz cache_adj.pkl.gz cache_raw_all.pkl.gz cache_adj_all.pkl.gz
          git commit -m "Auto-update data [skip ci]" || echo "No changes to commit"
          git push
