name: Daily Dashboard Update

on:
  schedule:
    - cron: '30 2 * * *' # 8:00 AM IST
  workflow_dispatch: # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests # Ensure requests is installed

      - name: Run Auto Update
        run: python auto_update.py

      - name: Commit and push changes (optional)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dashboard.json dashboard_all.json
          git commit -m "Auto-update data [skip ci]" || echo "No changes to commit"
          git push
