name: Daily Dashboard Update

# DAILY: Batch 1 (market indices) + Batch 2 (core 80 ETFs).
# Data is published to Supabase Storage — the engines pull/push the Parquet cache
# and upload the website JSON to the public "site-data" bucket. There is NO git
# commit and NO Netlify deploy, so the daily update no longer costs deploy credits.
# The live site reads the fresh JSON from Supabase via the netlify.toml proxy.

on:
  schedule:
    - cron: '30 1 * * *'    # Every day at 7:00 AM IST (1:30 AM UTC) — indices + 80 ETFs
    - cron: '30 1 1 * *'    # 1st of every month at 7:00 AM IST — also refreshes fundamentals
  workflow_dispatch:          # Allows manual trigger from GitHub UI

# Supabase credentials (stored as encrypted repo secrets) — available to every step.
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
  SUPABASE_SITE_BUCKET: ${{ secrets.SUPABASE_SITE_BUCKET }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pyarrow openpyxl requests

      - name: Run Daily Price Update (indices + 80 ETFs) -> Supabase
        run: python auto_update.py

      - name: Run Monthly Fundamentals Update (1st only) -> Supabase
        if: ${{ github.event_name == 'schedule' && startsWith(github.event.schedule, '30 1 1') }}
        run: |
          echo "Running monthly fundamentals refresh (1st of month)..."
          python update_fundamentals.py

      - name: Done
        run: echo "Data published to Supabase Storage. No git commit / no Netlify deploy."
