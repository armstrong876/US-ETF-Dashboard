name: Weekly Full-Universe Update

# WEEKLY: Batch 3 — the full ~4000+ ETF universe (data_engine_all.py).
# This fetch is large and rate-limit-prone, so it is deliberately kept OFF the
# daily critical path. Data is published to Supabase Storage (dashboard_all.json
# to the public "site-data" bucket, the full-universe Parquet to the private
# bucket). No git commit and no Netlify deploy.

on:
  schedule:
    - cron: '30 2 * * 0'    # Every Sunday at 8:00 AM IST (2:30 AM UTC) — 1h after daily
  workflow_dispatch:          # Allows manual trigger from GitHub UI

# Supabase credentials (stored as encrypted repo secrets) — available to every step.
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
  SUPABASE_SITE_BUCKET: ${{ secrets.SUPABASE_SITE_BUCKET }}

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pyarrow openpyxl requests

      - name: Run Weekly Full-Universe Update (4000+ ETFs) -> Supabase
        run: python data_engine_all.py

      - name: Done
        run: echo "Full-universe data published to Supabase Storage. No git commit / no Netlify deploy."
