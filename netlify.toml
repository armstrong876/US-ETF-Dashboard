[build]
  publish = "."
  command = ""

# Root URL → serve index.html (auth.js will redirect to login.html if not logged in)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = false

# Login page stays at /login.html
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"
